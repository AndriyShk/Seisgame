<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seismic: Core Dodger</title>
    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Seismic: Core Dodger - an exciting journey to the planet's core. Dodge obstacles and break records!">
    <meta property="og:title" content="Seismic: Core Dodger 🌋">
    <meta property="og:description" content="Can you reach the Earth's core? Dodge lava and rocks in this dynamic adventure!">
    <meta property="og:image" content="preview.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Seismic: Core Dodger 🌋">
    <meta name="twitter:description" content="Reaction is your weapon. Try to conquer the core! Play now!">
    <meta name="twitter:image" content="preview.png">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌋</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Game Canvas -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- Score UI -->
        <div id="score-board">
            <div class="score-row">
                <span id="depth-text">DEPTH:</span>
                <span id="score-value">0</span><span id="score-unit">m</span>
            </div>
            <div id="layer-name">EARTH'S CRUST</div>
        </div>
        
        <!-- Menu/Overlay Screens -->
        <div id="overlay" class="screen flex-center">
            <div class="panel">
                <h1 id="main-title" class="logo">SEISMIC<br><span class="subtitle">Core Tamer</span></h1>
                <p id="game-message">Reach the planet's core (5000m) and avoid obstacles!<br><br>Controls:<br>PC: 🡨 🡪 (or A, D)<br>Mobile: Screen buttons or tilt</p>
                <div id="final-score-container" class="hidden">
                    <p class="score-text">Record: <span id="high-score">0</span>m</p>
                    <p class="score-text big-score">Your result: <span id="final-score">0</span>m</p>
                    <button id="share-btn" class="share-btn">SHARE ON X</button>
                </div>
                <button id="start-btn">START DESCENT</button>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div id="controls-ui">
            <button id="btn-left" class="control-btn">🡄</button>
            <button id="btn-right" class="control-btn">🡆</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
